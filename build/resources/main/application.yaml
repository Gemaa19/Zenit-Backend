ktor:
  deployment:
    port: 8080
  application:
    modules:
    - com.gema.zenit.MainKt.module

storage:
  driverClassName: "com.mysql.cj.jdbc.Driver"
  jdbcURL: ${DB_URL}
  user: ${DB_USER}
  password: ${DB_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  issuer: "http://0.0.0.0:8080/"
  audience: "http://0.0.0.0:8080/hello"
  realm: "Access to 'zenit'"